name: Fetch Sudan News & Images

on:
  schedule:
    - cron: '0 6 * * *'  # 6 AM UTC = 9 AM Sudan time
  workflow_dispatch:

jobs:
  fetch-content:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Fetch news articles
        run: python scripts/fetch_news.py

      - name: Fetch Sudan images
        run: python scripts/fetch_images.py

      - name: Commit and push new content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/news/ content/images/
          git diff --cached --quiet || git commit -m "Auto: fetch news & images $(date -u '+%Y-%m-%d')"
          git push
