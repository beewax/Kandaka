{{ define "main" }}
<div class="flag-hero">
  <div class="flag-hero-content">
    <h1>{{ .Site.Title }}</h1>
    {{ with .Site.Params.description }}<p>{{ . }}</p>{{ end }}
  </div>
</div>

<section class="ph4 pv4 mw8 center">
  <h2 class="f3 mb4">Recent Posts</h2>
  {{ range first 10 (where .Site.RegularPages "Section" "posts") }}
    <article class="mb4 pb4 bb b--black-10">
      <h3 class="f4 fw6 mb2">
        <a href="{{ .RelPermalink }}" class="link near-black hover-blue">{{ .Title }}</a>
      </h3>
      <p class="f6 gray mb2">{{ .Date.Format "January 2, 2006" }}</p>
      <p class="lh-copy">{{ .Summary }}</p>
      <a href="{{ .RelPermalink }}" class="link blue f6">Read more →</a>
    </article>
  {{ end }}
</section>
{{ end }}
