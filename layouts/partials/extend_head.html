<style>
/* Sudan 1956 flag hero */
article.first-entry.home-info::before {
  content: "";
  display: block;
  width: 100%;
  max-width: 500px;
  height: 280px;
  background-image: url("/images/flag.svg");
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
  margin: 0 auto 2rem;
}

/* Language switcher: full names */
html[lang="en"] .lang-menu a[href*="/ar/"] {
  font-size: 0;
}
html[lang="en"] .lang-menu a[href*="/ar/"]::after {
  content: "العربية";
  font-size: 14px;
  white-space: nowrap;
}
html[lang="ar"] .lang-menu a[href$="/"]:not([href*="/ar"]) {
  font-size: 0;
}
html[lang="ar"] .lang-menu a[href$="/"]:not([href*="/ar"])::after {
  content: "English";
  font-size: 14px;
  white-space: nowrap;
}

/* Kandaka wordmark — Nubian Bronze with flag stripe */
.logo > a {
  font-family: Georgia, "Times New Roman", serif;
  font-weight: 800;
  font-size: 1.7rem;
  letter-spacing: -0.02em;
  color: #6B3410;
  background-image: linear-gradient(
    to right,
    #0F3DAB 0%,
    #0F3DAB 33.33%,
    #FFC700 33.33%,
    #FFC700 66.66%,
    #009A3D 66.66%,
    #009A3D 100%
  );
  background-repeat: no-repeat;
  background-size: 100% 5px;
  background-position: 0 100%;
  padding-bottom: 7px;
}

/* Hide "Powered by Hugo & PaperMod" footer line */
.footer span:nth-of-type(2) {
  display: none;
}
.footer span:nth-of-type(1) + span,
.footer > span + ::before {
  content: "";
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
  // Improve dark mode toggle tooltip
  var toggle = document.getElementById('theme-toggle');
  if (toggle) {
    var lang = document.documentElement.lang;
    if (lang === 'ar') {
      toggle.title = 'تبديل بين الوضع الفاتح والداكن';
      toggle.setAttribute('aria-label', 'تبديل بين الوضع الفاتح والداكن');
    } else {
      toggle.title = 'Switch between light and dark mode';
      toggle.setAttribute('aria-label', 'Switch between light and dark mode');
    }
  }

  // Remove "Powered by" footer text dynamically
  var footer = document.querySelector('.footer');
  if (footer) {
    var spans = footer.querySelectorAll('span');
    if (spans.length > 1) {
      spans[1].remove();
      // Also remove the · separator (which is text content between spans)
      footer.innerHTML = footer.innerHTML.replace(/·\s*$/, '').replace(/·\s*<span><\/span>/, '');
    }
  }
});
</script>
