baseURL = "https://kandaka.com/"
title = "Kandaka"
theme = "PaperMod"
defaultContentLanguage = "en"

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

pygmentsUseClasses = true
pygmentsCodeFences = true

[services.googleAnalytics]
  ID = "G-MQ6B4L68WB"

[outputs]
  home = ["HTML", "RSS", "JSON"]

# LANGUAGE: ENGLISH
[languages.en]
  languageCode = "en"
  languageName = "English"
  languageDirection = "ltr"
  weight = 1
  title = "Kandaka"

  [languages.en.params]
    description = "Sudan news, analysis, and a digital library of scholarship on the country."
  [[languages.en.menu.main]]
    identifier = "news"
    name = "News"
    url = "/news/"

  [[languages.en.menu.main]]
    identifier = "library"
    name = "Library"
    url = "/library/"

  [[languages.en.menu.main]]
    identifier = "development"
    name = "Development"
    url = "/development/"

  [[languages.en.menu.main]]
    identifier = "ideas"
    name = "Ideas"
    url = "/ideas/"

  [[languages.en.menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"

  [[languages.en.menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"

