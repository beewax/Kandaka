baseURL = "https://kandaka.com/"
title = "Kandaka"
theme = "PaperMod"
defaultContentLanguage = "en"

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

pygmentsUseClasses = true
pygmentsCodeFences = true

[services.googleAnalytics]
  ID = "G-MQ6B4L68WB"

[outputs]
  home = ["HTML", "RSS", "JSON"]

# LANGUAGE: ENGLISH
[languages.en]
  languageCode = "en"
  languageName = "English"
  languageDirection = "ltr"
  weight = 1
  title = "Kandaka"

  [languages.en.params]
    description = "Sudan news, analysis, and a digital library of scholarship on the country."
  [[languages.en.menu.main]]
    identifier = "news"
    name = "News"
    url = "/news/"

  [[languages.en.menu.main]]
    identifier = "library"
    name = "Library"
    url = "/library/"

  [[languages.en.menu.main]]
    identifier = "development"
    name = "Development"
    url = "/development/"

  [[languages.en.menu.main]]
    identifier = "ideas"
    name = "Ideas"
    url = "/ideas/"

  [[languages.en.menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"

  [[languages.en.menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"

# LANGUAGE: ARABIC
[languages.ar]
  languageCode = "ar"
  languageName = "العربية"
  languageDirection = "rtl"
  weight = 2
  title = "كاندكة"

  [languages.ar.params]
    description = "تحليلات وأخبار السودان ومكتبة رقمية للدراسات المتعلقة بالبلاد."
  [[languages.ar.menu.main]]
    identifier = "news"
    name = "الأخبار"
    url = "/ar/news/"

  [[languages.ar.menu.main]]
    identifier = "library"
    name = "المكتبة"
    url = "/ar/library/"

  [[languages.ar.menu.main]]
    identifier = "development"
    name = "التنمية"
    url = "/ar/development/"

  [[languages.ar.menu.main]]
    identifier = "ideas"
    name = "أفكار"
    url = "/ar/ideas/"

  [[languages.ar.menu.main]]
    identifier = "about"
    name = "حول"
    url = "/ar/about/"

  [[languages.ar.menu.main]]
    identifier = "search"
    name = "بحث"
    url = "/ar/search/"

[params]
  env = "production"
  author = "Kandaka"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowPostNavLinks = true

  [params.footer]
    text = "[About](/about/) · [Contact](mailto:admin@kandaka.com)"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/beewax/Kandaka"

  [[params.socialIcons]]
    name = "x"
    url = "https://x.com/kandaka"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true