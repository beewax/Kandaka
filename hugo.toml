baseURL = "https://kandaka.com/"
languageCode = "en-us"
title = "Kandaka"
theme = "PaperMod"
[services.googleAnalytics]
  ID = "G-MQ6B4L68WB"

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  title = "Kandaka"
  description = "An Economics Development Website for Sudan"
  keywords = ["Economics", "Sudan", "Development"]
  author = "Kandaka"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  googleAnalytics = "G-MQ6B4L68WB"

  [params.homeInfoParams]
    Title = "Kandaka"
    Content = "An Economics Development Website for Sudan. Welcome — explore articles on Sudan's economy, development, and future."

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/beewax/Kandaka"

[[menu.main]]
  identifier = "posts"
  name = "Posts"
  url = "/posts/"
  weight = 10

[[menu.main]]
  identifier = "archive"
  name = "Archive"
  url = "/archives/"
  weight = 20

[[menu.main]]
  identifier = "search"
  name = "Search"
  url = "/search/"
  weight = 30

[outputs]
  home = ["HTML", "RSS", "JSON"]