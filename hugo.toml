baseURL = "https://kandaka.netlify.app/"
languageCode = "en-us"
title = "Kandaka"
theme = "PaperMod"

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  customCSS = ["css/custom.css"]
  title = "Kandaka"
  description = "An Economics Development Website for Sudan"
  keywords = ["Economics", "Sudan", "Development"]
  author = "Kandaka"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true

  [params.homeInfoParams]
    Title = "Kandaka <svg width='40' height='27' viewBox='0 0 1200 800' style='display:inline-block;vertical-align:middle;margin-left:8px;border-radius:3px'><rect width='1200' height='267' fill='#0F3DAB'/><rect y='267' width='1200' height='266' fill='#FFEB00'/><rect y='533' width='1200' height='267' fill='#009A3D'/></svg>"
    Content = "An Economics Development Website for Sudan. Welcome — explore articles on Sudan's economy, development, and future."

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/beewax/Kandaka"

[[menu.main]]
  identifier = "posts"
  name = "Posts"
  url = "/posts/"
  weight = 10

[[menu.main]]
  identifier = "archive"
  name = "Archive"
  url = "/archives/"
  weight = 20

[[menu.main]]
  identifier = "search"
  name = "Search"
  url = "/search/"
  weight = 30

[outputs]
  home = ["HTML", "RSS", "JSON"]